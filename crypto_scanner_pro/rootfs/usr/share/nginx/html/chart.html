<!DOCTYPE html>
<html lang="it" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-Chart - Crypto Scanner Pro v3.3.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lightweight-charts@5/dist/lightweight-charts.standalone.production.js"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: { colors: { dark: { bg: '#0F0F0F', card: '#161A1E', hover: '#1E222D', border: '#2A2E39' } } } }
        }
    </script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
        .btn-page-active  { background: #2563EB; color: #fff; }
        .btn-page-idle    { color: #6B7280; background: #1E222D; }
        .btn-page-idle:hover { color: #B2B5BE; background: #2A2E39; }
        .btn-tf-active    { background: #4A4A4A; color: #fff; }
        .btn-tf-idle      { color: #6B7280; background: transparent; }
        .btn-tf-idle:hover { color: #B2B5BE; background: transparent; }
        .btn-gain-active  { background: #065f46; color: #34d399; }
        .btn-gain-idle    { color: #6B7280; background: #1E222D; }
        .btn-gain-idle:hover { color: #34d399; background: #064e3b; }
        .btn-loss-active  { background: #7f1d1d; color: #f87171; }
        .btn-loss-idle    { color: #6B7280; background: #1E222D; }
        .btn-loss-idle:hover { color: #f87171; background: #450a0a; }
        .btn-fav-active   { background: #78350f; color: #fbbf24; }
        .btn-fav-idle     { color: #6B7280; background: #1E222D; }
        .btn-fav-idle:hover { color: #fbbf24; background: #451a03; }
        .btn-view-active  { background: #374151; color: #E5E7EB; }
        .btn-view-idle    { color: #6B7280; background: #1E222D; }
        .btn-view-idle:hover { color: #B2B5BE; background: #2A2E39; }
        .btn-ico-active   { background: #312e81; color: #a5b4fc; }
        .btn-ico-idle     { color: #6B7280; background: #1E222D; }
        .btn-ico-idle:hover { color: #a5b4fc; background: #1e1b4b; }

        /* Side nav arrows */
        .side-nav {
            position: fixed; top: 50%; transform: translateY(-50%);
            z-index: 50; background: rgba(22,26,30,0.5); border: none;
            cursor: pointer; color: #6B7280; font-size: 24px;
            padding: 28px 7px; transition: background .15s, color .15s;
            user-select: none;
        }
        .side-nav:hover { background: rgba(43,49,57,0.92); color: #E5E7EB; }
        #nav-prev { left:0;  border-radius: 0 6px 6px 0; }
        #nav-next { right:0; border-radius: 6px 0 0 6px; }

        @media (max-width: 639px) {
            /* Header principale scrollabile */
            header {
                overflow-x: auto; overflow-y: hidden;
                -webkit-overflow-scrolling: touch;
                height: auto !important; min-height: 48px;
            }
            header .flex-1 { flex: 0 0 8px !important; min-width: 8px; }
            #status { display: none; }

            /* Fullscreen header scrollabile */
            #fs-overlay > div:first-child {
                overflow-x: auto !important; overflow-y: hidden !important;
                -webkit-overflow-scrolling: touch;
                height: auto !important; min-height: 44px;
            }
            #fs-hdr-spacer { flex: 0 0 8px !important; min-width: 8px; }

            /* Alert panel full-width */
            #alerts-panel > div {
                width: calc(100% - 24px) !important;
                right: 12px !important; left: 12px !important;
                top: 52px !important;
            }

            /* OB modal verticale */
            #ob-modal { flex-direction: column !important; }
            #ob-modal > div:first-child {
                flex: 0 0 50% !important;
                border-right: none !important;
                border-bottom: 1px solid #2A2E39;
            }
            #ob-modal > div:last-child { flex: 0 0 50% !important; }

            /* Grid mobile: 1 grafico per volta, navigazione via JS */
            #grid {
                grid-template-columns: 1fr !important;
                grid-template-rows: 1fr !important;
            }
            /* Frecce chart: ingrandisci e sposta in basso per raggiungibilità con pollice */
            .side-nav {
                top: auto !important;
                bottom: 72px !important;
                transform: none !important;
                padding: 20px 16px !important;
                font-size: 22px;
                background: rgba(22,26,30,0.92) !important;
            }
            #btn-view { display: none !important; }
    </style>
</head>
<body class="bg-dark-bg text-gray-100" style="height:100vh;display:flex;flex-direction:column;overflow:hidden;">

<!-- ===== MAIN HEADER ===== -->
<header class="flex items-center gap-2 px-3 flex-shrink-0" style="height:48px;background:#0F0F0F;border-bottom:2px solid #2C2C2C;">

    <a href="./" class="text-xs text-gray-400 hover:text-gray-200 px-2 py-1 rounded hover:bg-dark-hover transition-colors whitespace-nowrap">
        ← Scanner
    </a>

    <div class="w-px h-5 bg-dark-border"></div>

    <div class="flex gap-1">
        <button id="btn-mode-gain" onclick="switchMode('gainers')"   class="px-3 py-1 rounded text-xs font-medium transition-colors btn-gain-active">▲ Migliori</button>
        <button id="btn-mode-loss" onclick="switchMode('losers')"    class="px-3 py-1 rounded text-xs font-medium transition-colors btn-loss-idle">▼ Peggiori</button>
        <button id="btn-mode-ico"  onclick="switchMode('ico')"       class="px-3 py-1 rounded text-xs font-medium transition-colors btn-ico-idle">◆ ICO</button>
        <button id="btn-mode-fav"  onclick="switchMode('favorites')" class="px-3 py-1 rounded text-xs font-medium transition-colors btn-fav-idle">★ Preferiti</button>
    </div>

    <div class="w-px h-5 bg-dark-border"></div>

    <button id="btn-view" onclick="toggleView()" class="px-3 py-1 rounded text-xs font-medium transition-colors btn-view-idle" title="Alterna tra 9 e 18 grafici">⊞ 18</button>

    <div class="w-px h-5 bg-dark-border"></div>

    <div class="flex gap-1" id="tf-bar"></div>

    <div class="w-px h-5 bg-dark-border"></div>
    <button id="alerts-btn" onclick="openAlertsPanel()" class="px-2 py-1 rounded text-xs font-medium transition-colors btn-view-idle" title="Alert attivi">🔔</button>
    <button onclick="openOBModal(allCoins[0]?.symbol||'BTCUSDT')" class="px-2 py-1 rounded text-xs font-medium transition-colors btn-view-idle" title="Order Book">📖 OB</button>

    <div class="flex-1"></div>
    <span id="status" class="text-xs text-gray-500 mr-2"></span>

    <div id="ws-dot" class="flex items-center gap-1.5">
        <div class="w-2 h-2 bg-gray-500 rounded-full"></div>
        <span class="text-xs text-gray-500">WS</span>
    </div>
</header>

<!-- Side navigation arrows (visible only in 9-view) -->
<button id="nav-prev" class="side-nav" onclick="prevPage()">&#8249;</button>
<button id="nav-next" class="side-nav" onclick="nextPage()">&#8250;</button>

<!-- ===== GRID ===== -->
<div id="grid" style="flex:1;display:grid;grid-template-columns:repeat(3,1fr);grid-template-rows:repeat(3,1fr);overflow:hidden;min-height:0;"></div>

<!-- Empty state notice -->
<div id="fav-empty" style="display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;pointer-events:none;z-index:5;">
    <div id="fav-empty-icon"  style="font-size:48px;margin-bottom:12px;">★</div>
    <div id="fav-empty-title" style="font-size:16px;color:#B2B5BE;">Nessun preferito</div>
    <div id="fav-empty-sub"   style="font-size:12px;color:#6B7280;margin-top:6px;">Clicca ★ su qualsiasi grafico per aggiungerlo</div>
</div>

<!-- ===== FULLSCREEN OVERLAY ===== -->
<div id="fs-overlay" style="display:none;position:fixed;inset:0;z-index:100;background:#0F0F0F;flex-direction:column;">

    <div style="height:48px;flex-shrink:0;background:#0F0F0F;border-bottom:2px solid #2C2C2C;display:flex;align-items:center;gap:8px;padding:0 14px;">
        <span id="fs-title"  style="font-size:15px;font-weight:700;color:#E5E7EB;"></span>
        <span id="fs-change" style="font-size:12px;font-weight:500;"></span>
        <span style="color:#374151;font-size:11px;">|</span>
        <span id="fs-vol"    style="font-size:11px;color:#60a5fa;"></span>
        <span style="color:#374151;font-size:11px;">|</span>
        <div  id="fs-tf-bar" style="display:flex;gap:3px;align-items:center;"></div>
        <span style="color:#374151;font-size:11px;">|</span>
        <a id="fs-bybit-link" href="#" target="_blank" rel="noopener noreferrer"
           style="font-size:11px;color:#f7a600;text-decoration:none;padding:2px 7px;border-radius:3px;background:#1E222D;white-space:nowrap;">Bybit ↗</a>

        <div id="fs-hdr-spacer" style="flex:1;"></div>

        <div id="fs-ws-dot" class="flex items-center gap-1.5">
            <div class="w-2 h-2 bg-gray-500 rounded-full"></div>
            <span class="text-xs text-gray-500">WS</span>
        </div>
        <span id="fs-candle-pct" style="font-size:12px;font-family:monospace;min-width:58px;text-align:right;"></span>
        <button onclick="if(fsCoin) window.open('mtf?symbol='+fsCoin.symbol, '_blank')"
            style="margin-left:8px;padding:4px 10px;font-size:12px;background:#2A2E39;color:#B2B5BE;border:none;border-radius:4px;cursor:pointer;"
            title="Multi Timeframe">
            ⊞ MTF
        </button>
        <button onclick="if(fsCoin) openOBModal(fsCoin.symbol)"
            style="margin-left:4px;padding:4px 10px;font-size:12px;background:#2A2E39;color:#B2B5BE;border:none;border-radius:4px;cursor:pointer;"
            title="Order Book">
            📖 OB
        </button>
        <button id="fs-ob-lvl-btn" onclick="toggleFsOBLevels()"
            style="margin-left:4px;padding:4px 10px;font-size:12px;background:#2A2E39;color:#B2B5BE;border:none;border-radius:4px;cursor:pointer;"
            title="Livelli bid/ask">
            OB Lvl
        </button>
        <button onclick="if(fsChart) fsChart.timeScale().fitContent()"
            style="margin-left:4px;padding:4px 10px;font-size:12px;background:#2A2E39;color:#B2B5BE;border:none;border-radius:4px;cursor:pointer;"
            title="Reset zoom">
            ↺ Reset
        </button>
        <button onclick="closeFullscreen()"
            style="margin-left:4px;padding:4px 10px;font-size:12px;background:#2A2E39;color:#B2B5BE;border:none;border-radius:4px;cursor:pointer;">
            ✕ Chiudi
        </button>
    </div>

    <div style="flex:1;position:relative;min-height:0;">
        <div id="fs-chart-el" style="position:absolute;inset:0;"></div>
    </div>
</div>

<!-- Alert popover -->
<div id="alert-popover" style="display:none;position:fixed;z-index:200;background:#161A1E;border:1px solid #2A2E39;border-radius:8px;padding:14px 16px;min-width:240px;box-shadow:0 8px 32px rgba(0,0,0,.7);">
    <div style="font-size:13px;font-weight:700;color:#E5E7EB;margin-bottom:6px;">🔔 Imposta Alert</div>
    <div id="alert-pop-symbol" style="font-size:11px;color:#B2B5BE;margin-bottom:3px;"></div>
    <div id="alert-pop-price"  style="font-size:17px;font-family:monospace;color:#fbbf24;margin-bottom:8px;"></div>
    <div style="margin-bottom:10px;">
        <div style="font-size:10px;color:#6B7280;margin-bottom:4px;">Notifica via:</div>
        <div style="display:flex;gap:4px;">
            <button id="notify-both" onclick="setNotifyMode('both')" style="flex:1;padding:5px 0;font-size:10px;background:#1d4ed8;color:#fff;border:none;border-radius:4px;cursor:pointer;font-weight:600;">📱 Telegram + PC</button>
            <button id="notify-browser" onclick="setNotifyMode('browser')" style="flex:1;padding:5px 0;font-size:10px;background:#1E222D;color:#6B7280;border:none;border-radius:4px;cursor:pointer;font-weight:600;">🖥 Solo PC</button>
        </div>
    </div>
    <div style="display:flex;gap:6px;">
        <button onclick="confirmAlert('above')" style="flex:1;padding:7px 0;font-size:12px;background:#065f46;color:#34d399;border:none;border-radius:4px;cursor:pointer;font-weight:600;">↑ Sopra</button>
        <button onclick="confirmAlert('below')" style="flex:1;padding:7px 0;font-size:12px;background:#7f1d1d;color:#f87171;border:none;border-radius:4px;cursor:pointer;font-weight:600;">↓ Sotto</button>
        <button onclick="closeAlertPopover()" style="flex:1;padding:7px 0;font-size:12px;background:#1E222D;color:#B2B5BE;border:none;border-radius:4px;cursor:pointer;">✕</button>
    </div>
</div>

<!-- Alerts panel -->
<div id="alerts-panel" style="display:none;position:fixed;inset:0;z-index:250;background:rgba(0,0,0,.55);" onclick="closePanelOutside(event)">
    <div style="position:absolute;top:56px;right:12px;width:340px;background:#161A1E;border:1px solid #2A2E39;border-radius:8px;box-shadow:0 8px 32px rgba(0,0,0,.8);display:flex;flex-direction:column;max-height:calc(100vh - 80px);">
        <div style="padding:11px 14px;border-bottom:1px solid #2A2E39;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;">
            <span style="font-size:13px;font-weight:700;color:#E5E7EB;">🔔 Alert Attivi</span>
            <button onclick="closeAlertsPanel()" style="background:none;border:none;color:#6B7280;font-size:16px;cursor:pointer;padding:0;line-height:1;">✕</button>
        </div>
        <div id="alerts-list" style="overflow-y:auto;flex:1;padding:4px 0;"></div>
    </div>
</div>

<script>
// ── constants ─────────────────────────────────────────────────────────────────
const LC          = LightweightCharts;
let TZ_OFFSET_S   = 0;
const TIMEFRAMES  = ['1','5','30','60','240','D'];
const TF_LABEL    = {'1':'1m','5':'5m','30':'30m','60':'1h','240':'4h','D':'1D'};
const SLOTS_TOTAL = 18;
const EMA_CFG     = [
    {p:5,   color:'#ef4444', width:2},
    {p:10,  color:'#fbbf24', width:2},
    {p:60,  color:'#3b82f6', width:3},
    {p:223, color:'#a855f7', width:2.5},
];

const DEFAULT_CANDLES = {'1':100,'5':100,'30':80,'60':80,'240':60,'D':50};
function getCandlesForTF(tf) {
    try {
        const s = JSON.parse(localStorage.getItem('chart_candles_per_tf'));
        if (s && s[tf]) return Math.max(20, Math.min(500, parseInt(s[tf])));
    } catch(e) {}
    return DEFAULT_CANDLES[tf] || 80;
}

// ── state ─────────────────────────────────────────────────────────────────────
let curTF    = 'D';
let curPage  = 0;
let curMode  = 'gainers';
let viewMode = '9';      // '9' | '18'
let allCoins = [];
let favoriteSymbols = new Set();
let slots    = [];       // always 18 slots
let ws = null, wsTimer = null;

// fullscreen
let fsChart = null, fsCandleS = null, fsEmaS = {}, fsLastEMA = {};
let fsTF = '30', fsCoin = null;
let fsWs = null, fsWsTimer = null;
let fsDayHighLine = null, fsDayLowLine = null;
let fsPrevHighLine = null, fsPrevLowLine = null;

// OB fullscreen
let obChart = null, obCandleS = null, obEmaS = {}, obLastEMA = {};
let obTF = '30', obSymbolName = null;
let obWS = null, obWsTimer = null;
let obBidLine = null, obAskLine = null;
let obDayHighLine = null, obDayLowLine = null;
let obPrevHighLine = null, obPrevLowLine = null;
let fsMidLines = [], obMidLines = []; // kept for compat, no longer used
let fsObActive = false, fsObBidLine = null, fsObAskLine = null, fsObTimer = null;

const IS_MOBILE = window.innerWidth < 640;
let mobileChartIdx = 0;

// price alerts
let pendingAlert = null;
let notifyMode = 'both';
let activeAlerts = [];

// ── helpers ───────────────────────────────────────────────────────────────────
function fmtPrice(p) {
    if (p >= 10000) return p.toLocaleString('en-US', {maximumFractionDigits:1});
    if (p >= 1)     return p.toFixed(3);
    if (p >= 0.01)  return p.toFixed(5);
    return p.toFixed(7);
}

function fmtVol(v) {
    if (v >= 1e9) return '$' + (v / 1e9).toFixed(1) + 'B';
    if (v >= 1e6) return '$' + (v / 1e6).toFixed(0) + 'M';
    return '$' + (v / 1e3).toFixed(0) + 'K';
}

// ── price alert helpers ───────────────────────────────────────────────────────
function openAlertPopover(symbol, price, btn, slotIdx) {
    pendingAlert = { symbol, price, slotIdx };
    document.getElementById('alert-pop-symbol').textContent = symbol.replace('USDT','/USDT');
    document.getElementById('alert-pop-price').textContent  = fmtPrice(price);
    const pop  = document.getElementById('alert-popover');
    const rect = btn.getBoundingClientRect();
    const left = Math.max(4, Math.min(rect.left - 230, window.innerWidth - 250));
    const top  = Math.max(60, rect.top - 130);
    pop.style.left    = left + 'px';
    pop.style.top     = top  + 'px';
    pop.style.display = 'block';
}

function closeAlertPopover() {
    document.getElementById('alert-popover').style.display = 'none';
    pendingAlert = null;
}

function setNotifyMode(mode) {
    notifyMode = mode;
    const both = document.getElementById('notify-both');
    const browser = document.getElementById('notify-browser');
    if (mode === 'both') {
        both.style.background = '#1d4ed8'; both.style.color = '#fff';
        browser.style.background = '#1E222D'; browser.style.color = '#6B7280';
    } else {
        both.style.background = '#1E222D'; both.style.color = '#6B7280';
        browser.style.background = '#1d4ed8'; browser.style.color = '#fff';
    }
}

async function confirmAlert(condition) {
    if (!pendingAlert) return;
    const { symbol, price, slotIdx } = pendingAlert;
    try {
        const r = await fetch('api/price-alerts', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ symbol, price, condition, notify: notifyMode }),
        });
        const j = await r.json();
        closeAlertPopover();
        if (j.success) {
            showToast('🔔 Alert impostato!');
            if (j.alert) { activeAlerts.push(j.alert); updateAlertsBadge(); }
            if (slotIdx !== undefined && j.alert) addAlertLineToSlot(slotIdx, j.alert.id, price, condition);
        } else {
            showToast('❌ Errore alert');
        }
    } catch(e) { closeAlertPopover(); showToast('❌ Errore connessione'); }
}

async function initNotifications() {
    if ('Notification' in window && Notification.permission === 'default') {
        await Notification.requestPermission();
    }
}

function fireBrowserNotification(alert) {
    if (!('Notification' in window) || Notification.permission !== 'granted') return;
    const coin = alert.symbol.replace('USDT', '');
    const dir = alert.condition === 'above' ? '📈' : '📉';
    new Notification(`${dir} Alert: ${coin}/USDT`, {
        body: `Prezzo ${alert.condition === 'above' ? 'sopra' : 'sotto'} ${alert.price}`,
    });
}

async function pollTriggeredAlerts() {
    try {
        const r = await fetch('api/price-alerts/recent-triggered');
        const j = await r.json();
        if (j.success && j.data && j.data.length) {
            for (const a of j.data) {
                fireBrowserNotification(a);
                for (const s of slots) {
                    if (s.symbol === a.symbol && s.alertLines.has(a.id)) {
                        try { s.candleS.removePriceLine(s.alertLines.get(a.id)); } catch(e) {}
                        s.alertLines.delete(a.id);
                    }
                }
                activeAlerts = activeAlerts.filter(x => x.id !== a.id);
            }
            updateAlertsBadge();
        }
    } catch(e) {}
    setTimeout(pollTriggeredAlerts, 30000);
}

function addAlertLineToSlot(idx, alertId, price, condition) {
    const s = slots[idx];
    if (!s || !s.candleS) return;
    try {
        const pl = s.candleS.createPriceLine({
            price,
            color: condition === 'above' ? '#34d399' : '#f87171',
            lineWidth: 1,
            lineStyle: LC.LineStyle ? LC.LineStyle.Dashed : 2,
            axisLabelVisible: true,
            title: condition === 'above' ? '▲' : '▼',
        });
        s.alertLines.set(alertId, pl);
    } catch(e) {}
}

async function syncAllAlertLines() {
    try {
        const r = await fetch('api/price-alerts');
        const j = await r.json();
        if (!j.success) return;
        activeAlerts = j.data;
        updateAlertsBadge();
        for (let i = 0; i < slots.length; i++) {
            const s = slots[i];
            if (!s.symbol) continue;
            for (const a of j.data) {
                if (a.symbol === s.symbol && !s.alertLines.has(a.id))
                    addAlertLineToSlot(i, a.id, a.price, a.condition);
            }
        }
    } catch(e) {}
}

function updateAlertsBadge() {
    const btn = document.getElementById('alerts-btn');
    if (!btn) return;
    const n = activeAlerts.length;
    btn.textContent = n > 0 ? `🔔 ${n}` : '🔔';
    btn.style.color = n > 0 ? '#fbbf24' : '';
}

function openAlertsPanel() {
    renderAlertsList();
    document.getElementById('alerts-panel').style.display = 'block';
}

function closeAlertsPanel() {
    document.getElementById('alerts-panel').style.display = 'none';
}

function closePanelOutside(e) {
    if (e.target === document.getElementById('alerts-panel')) closeAlertsPanel();
}

function renderAlertsList() {
    const list = document.getElementById('alerts-list');
    if (!list) return;
    if (activeAlerts.length === 0) {
        list.innerHTML = '<div style="text-align:center;color:#6B7280;font-size:12px;padding:24px 0;">Nessun alert attivo</div>';
        return;
    }
    list.innerHTML = activeAlerts.map(a => {
        const coin = a.symbol.replace('USDT', '/USDT');
        const dirColor = a.condition === 'above' ? '#34d399' : '#f87171';
        const dirLabel = a.condition === 'above' ? '▲ Sopra' : '▼ Sotto';
        const notifyIcon = a.notify === 'browser' ? '🖥' : '📱';
        return `<div style="display:flex;align-items:center;gap:8px;padding:8px 14px;border-bottom:1px solid #1E222D;">
            <span style="font-size:11px;font-weight:700;color:#E5E7EB;min-width:76px;">${coin}</span>
            <span style="font-size:11px;color:${dirColor};font-weight:600;min-width:52px;">${dirLabel}</span>
            <span style="font-size:11px;font-family:monospace;color:#fbbf24;flex:1;">${fmtPrice(a.price)}</span>
            <span style="font-size:12px;" title="${a.notify === 'browser' ? 'Solo PC' : 'Telegram + PC'}">${notifyIcon}</span>

async function deleteAlert(id) {
    try {
        await fetch(`api/price-alerts/${id}`, { method: 'DELETE' });
        for (const s of slots) {
            if (s.alertLines.has(id)) {
                try { s.candleS.removePriceLine(s.alertLines.get(id)); } catch(e) {}
                s.alertLines.delete(id);
            }
        }
        activeAlerts = activeAlerts.filter(a => a.id !== id);
        updateAlertsBadge();
        renderAlertsList();
    } catch(e) { showToast('❌ Errore eliminazione'); }
}

function showToast(msg) {
    const t = document.createElement('div');
    t.textContent = msg;
    t.style.cssText = 'position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1E222D;color:#E5E7EB;padding:8px 18px;border-radius:6px;font-size:13px;z-index:300;border:1px solid #2A2E39;pointer-events:none;opacity:1;transition:opacity .3s;';
    document.body.appendChild(t);
    setTimeout(() => { t.style.opacity = '0'; setTimeout(() => t.remove(), 320); }, 2500);
}

document.addEventListener('click', e => {
    const pop = document.getElementById('alert-popover');
    // Check if click lands on any alert button (pointer-events:none, so click passes through to chart)
    for (let i = 0; i < slots.length; i++) {
        const s = slots[i];
        if (!s.alertBtn || s.alertBtn.style.display === 'none') continue;
        const r = s.alertBtn.getBoundingClientRect();
        if (e.clientX >= r.left - 3 && e.clientX <= r.right  + 3 &&
            e.clientY >= r.top  - 3 && e.clientY <= r.bottom + 3) {
            const price = s.crosshairPrice || s.lastPrice;
            if (price && s.symbol) openAlertPopover(s.symbol, price, s.alertBtn, i);
            return;
        }
    }
    if (pop && pop.style.display !== 'none' && !pop.contains(e.target))
        closeAlertPopover();
});

function calcEMA(bars, period) {
    const k = 2 / (period + 1);
    let v = bars[0].close;
    return bars.map((b, i) => {
        if (i > 0) v = b.close * k + v * (1 - k);
        return { time: b.time, value: v };
    });
}

// ── price format helper ───────────────────────────────────────────────────────
function getPriceFormat(price) {
    const p = Math.abs(price || 0);
    if (p >= 100)   return { type:'price', precision:2, minMove:0.01 };
    if (p >= 10)    return { type:'price', precision:3, minMove:0.001 };
    if (p >= 1)     return { type:'price', precision:4, minMove:0.0001 };
    if (p >= 0.1)   return { type:'price', precision:5, minMove:0.00001 };
    if (p >= 0.01)  return { type:'price', precision:6, minMove:0.000001 };
    if (p >= 0.001) return { type:'price', precision:7, minMove:0.0000001 };
    return            { type:'price', precision:8, minMove:0.00000001 };
}

// ── chart factory ─────────────────────────────────────────────────────────────
function addSeries(chart, type, opts) {
    if (typeof chart.addSeries === 'function' && LC[type]) return chart.addSeries(LC[type], opts);
    const legacy = { CandlestickSeries:'addCandlestickSeries', LineSeries:'addLineSeries' };
    return chart[legacy[type]](opts);
}

function makeChart(el, opts) {
    return LC.createChart(el, {
        autoSize: true,
        layout: { background:{color:'#0F0F0F'}, textColor:'#B2B5BE', fontSize: opts?.fontSize || 10 },
        grid:    { vertLines:{color:'#FFFFFF0F'}, horzLines:{color:'#FFFFFF0F'} },
        crosshair: { mode: LC.CrosshairMode ? LC.CrosshairMode.Normal : 1 },
        rightPriceScale: { borderColor:'#2A2E39', scaleMargins:{top:0.05, bottom:0.05} },
        timeScale: { borderColor:'#2A2E39', visible:true, timeVisible:true, secondsVisible:false,
                     barSpacing: opts?.barSpacing || 3, rightOffset: opts?.rightOffset || 30 },
    });
}


// ── OB Levels (bid/ask wall) per slot e fullscreen ────────────────────────────
async function _fetchOBLevels(symbol) {
    const r = await fetch(`https://api.bybit.com/v5/market/orderbook?category=linear&symbol=${symbol}&limit=200`);
    const d = await r.json();
    if (d.retCode !== 0 || !d.result) return null;
    const asks = d.result.a.map(([p,v]) => [parseFloat(p), parseFloat(v)]);
    const bids = d.result.b.map(([p,v]) => [parseFloat(p), parseFloat(v)]);
    if (!asks.length || !bids.length) return null;
    return {
        ask: asks.reduce((m,x) => x[1]>m[1]?x:m)[0],
        bid: bids.reduce((m,x) => x[1]>m[1]?x:m)[0],
    };
}

async function fetchSlotOBLevels(idx) {
    const s = slots[idx];
    if (!s || !s.symbol || !s.candleS || !s.obActive) return;
    try {
        const lv = await _fetchOBLevels(s.symbol);
        if (!lv) return;
        if (s.obBidLine) { try { s.candleS.removePriceLine(s.obBidLine); } catch(e) {} }
        if (s.obAskLine) { try { s.candleS.removePriceLine(s.obAskLine); } catch(e) {} }
        s.obBidLine = s.candleS.createPriceLine({ price: lv.bid, color:'#10b981', lineWidth:1, lineStyle:1, axisLabelVisible:true, title:'Bid' });
        s.obAskLine = s.candleS.createPriceLine({ price: lv.ask, color:'#ef4444', lineWidth:1, lineStyle:1, axisLabelVisible:true, title:'Ask' });
    } catch(e) {}
}

function _clearSlotOBLines(s) {
    if (s.obBidLine) { try { s.candleS.removePriceLine(s.obBidLine); } catch(e) {} s.obBidLine = null; }
    if (s.obAskLine) { try { s.candleS.removePriceLine(s.obAskLine); } catch(e) {} s.obAskLine = null; }
}

function toggleSlotOBLevels(idx) {
    const s = slots[idx];
    if (!s) return;
    s.obActive = !s.obActive;
    if (s.obActive) {
        s.obEl.style.color = '#10b981';
        if (s.symbol) {
            fetchSlotOBLevels(idx);
            s.obTimer = setInterval(() => fetchSlotOBLevels(idx), 15000);
        }
    } else {
        clearInterval(s.obTimer); s.obTimer = null;
        _clearSlotOBLines(s);
        s.obEl.style.color = '#4B5563';
    }
}

async function fetchFsOBLevels() {
    if (!fsCoin || !fsCandleS || !fsObActive) return;

async function switchSlotTF(idx, tf) {
    const s = slots[idx];
    if (tf === s.curTF || !s.coin) return;
    if (ws && ws.readyState === WebSocket.OPEN)
        ws.send(JSON.stringify({ op:'unsubscribe', args:[`kline.${s.curTF}.${s.symbol}`] }));
    s.curTF = tf;
    renderSlotTF(idx);
    if (s.dayHighLine)  { try { s.candleS.removePriceLine(s.dayHighLine);  } catch(e) {} s.dayHighLine  = null; }
    if (s.dayLowLine)   { try { s.candleS.removePriceLine(s.dayLowLine);   } catch(e) {} s.dayLowLine   = null; }
    if (s.prevHighLine) { try { s.candleS.removePriceLine(s.prevHighLine); } catch(e) {} s.prevHighLine = null; }
    if (s.prevLowLine)  { try { s.candleS.removePriceLine(s.prevLowLine);  } catch(e) {} s.prevLowLine  = null; }
    s.candleS.setData([]);
    for (const {p} of EMA_CFG) s.emaSeries[p].setData([]);
    s.lastEMA = {5:null, 10:null, 60:null, 223:null};
    await loadSlotData(idx);
    if (ws && ws.readyState === WebSocket.OPEN)
        ws.send(JSON.stringify({ op:'subscribe', args:[`kline.${tf}.${s.symbol}`] }));
}

function connectFsWS() {
    closeFsWS();
    if (!fsCoin) return;
    setFsWSDot('connecting');
    fsWs = new WebSocket('wss://stream.bybit.com/v5/public/linear');
    fsWs.onopen = () => {
        setFsWSDot('live');
        fsWs.send(JSON.stringify({ op:'subscribe', args:[`kline.${fsTF}.${fsCoin.symbol}`] }));
    };
    fsWs.onmessage = ev => {
        let msg; try { msg = JSON.parse(ev.data); } catch(e) { return; }
        if (!msg.topic || !msg.topic.startsWith('kline.')) return;
        const b = msg.data[0];
        const confirmed = b.confirm === true || b.confirm === 'true';
        const candle = {
            time: Math.floor(parseInt(b.start)/1000) + TZ_OFFSET_S,
            open: parseFloat(b.open), high: parseFloat(b.high),
            low:  parseFloat(b.low),  close: parseFloat(b.close),
        };
        fsCandleS.update(candle);
        for (const {p} of EMA_CFG) {
            if (fsLastEMA[p] == null) continue;
            const k = 2/(p+1);
            const live = candle.close * k + fsLastEMA[p] * (1-k);
            fsEmaS[p].update({ time: candle.time, value: live });
            if (confirmed) fsLastEMA[p] = live;
        }
    };
    fsWs.onerror = () => setFsWSDot('error');
    fsWs.onclose = () => { setFsWSDot('off'); fsWsTimer = setTimeout(connectFsWS, 5000); };
}

function closeFsWS() {
    clearTimeout(fsWsTimer);
    if (fsWs) { try { fsWs.close(); } catch(e) {} fsWs = null; }
}

function setFsWSDot(state) {
    const map = {

}

function openWS() {
    const active = slots.filter(s => s.symbol);
    if (!active.length) return;
    setWSDot('connecting');
    ws = new WebSocket('wss://stream.bybit.com/v5/public/linear');
    ws.onopen = () => {
        setWSDot('live');
        ws.send(JSON.stringify({ op:'subscribe', args: active.map(s => `kline.${s.curTF}.${s.symbol}`) }));
    };
    ws.onmessage = ev => {
        let msg; try { msg = JSON.parse(ev.data); } catch(e) { return; }
        if (!msg.topic || !msg.topic.startsWith('kline.')) return;
        const parts   = msg.topic.split('.');
        const slotIdx = slots.findIndex(s => s.symbol === parts[2] && s.curTF === parts[1]);
        if (slotIdx === -1) return;
        const b = msg.data[0];
        const confirmed = b.confirm === true || b.confirm === 'true';
        const candle = {
            time: Math.floor(parseInt(b.start)/1000) + TZ_OFFSET_S,
            open: parseFloat(b.open), high: parseFloat(b.high),
            low:  parseFloat(b.low),  close: parseFloat(b.close),
        };
        const s = slots[slotIdx];
        s.candleS.update(candle);
        s.lastPrice = candle.close;
        for (const {p} of EMA_CFG) {
            if (s.lastEMA[p] === null) continue;
            const k = 2/(p+1);
            const live = candle.close * k + s.lastEMA[p] * (1-k);
            s.emaSeries[p].update({ time: candle.time, value: live });
            if (confirmed) s.lastEMA[p] = live;
        }
    };
    ws.onerror = () => setWSDot('error');
    ws.onclose = () => { setWSDot('off'); wsTimer = setTimeout(openWS, 5000); };
}

function closeWS() {
    clearTimeout(wsTimer);
    if (ws) { try { ws.close(); } catch(e) {} ws = null; }
}

function setWSDot(state) {
    const map = {

        error:     ['bg-red-500','','Err','text-red-400'],
        off:       ['bg-gray-500','','WS','text-gray-500'],
    };
    const [col,anim,label,tcol] = map[state]||map.off;
    document.getElementById('ws-dot').innerHTML =
        `<div class="w-2 h-2 ${col} ${anim} rounded-full"></div>`+
        `<span class="text-xs ${tcol}">${label}</span>`;

async function prevPage() {
    if (IS_MOBILE && viewMode !== '18') { await mobilePrevChart(); return; }
    if (curPage === 0 || viewMode === '18') return;
    curPage--; await loadPage();
}

async function nextPage() {
    if (IS_MOBILE && viewMode !== '18') { await mobileNextChart(); return; }
    const maxPage = Math.ceil(allCoins.length / 9) - 1;
    if (curPage >= maxPage || viewMode === '18') return;
    curPage++; await loadPage();
}

async function mobileNextChart() {
    const coinsOnPage = allCoins.slice(curPage * 9, curPage * 9 + 9).length;
    if (mobileChartIdx < coinsOnPage - 1) {
        mobileChartIdx++;
        applyView();
    } else {
        const maxPage = Math.ceil(allCoins.length / 9) - 1;
        if (curPage < maxPage) { curPage++; mobileChartIdx = 0; await loadPage(); }
    }
}

async function mobilePrevChart() {
    if (mobileChartIdx > 0) {
        mobileChartIdx--;
        applyView();
    } else if (curPage > 0) {
        curPage--; mobileChartIdx = 8; await loadPage();
    }
}

async function toggleView() {
    viewMode = viewMode === '9' ? '18' : '9';
    curPage  = 0; mobileChartIdx = 0;
    await loadPage();
}

            const ema = calcEMA(klines, p);
            obEmaS[p].setData(ema);
            obLastEMA[p] = ema[ema.length - 1].value;
        }
        const _on = getCandlesForTF(obTF);
        obChart.timeScale().setVisibleLogicalRange({ from: klines.length - _on, to: klines.length + 3 });
        if (obDayHighLine)  { try { obCandleS.removePriceLine(obDayHighLine);  } catch(e) {} obDayHighLine  = null; }
        if (obDayLowLine)   { try { obCandleS.removePriceLine(obDayLowLine);   } catch(e) {} obDayLowLine   = null; }
        if (obPrevHighLine) { try { obCandleS.removePriceLine(obPrevHighLine); } catch(e) {} obPrevHighLine = null; }
        if (obPrevLowLine)  { try { obCandleS.removePriceLine(obPrevLowLine);  } catch(e) {} obPrevLowLine  = null; }
        if (jd.success && jd.data && jd.data.length) {
            const today = jd.data[jd.data.length - 1];
            obDayHighLine  = obCandleS.createPriceLine({ price: today.high,  color:'#22c55e', lineWidth:2, lineStyle:0, axisLabelVisible:false, title:'' });
            obDayLowLine   = obCandleS.createPriceLine({ price: today.low,   color:'#ef4444', lineWidth:2, lineStyle:0, axisLabelVisible:false, title:'' });
            if (jd.data.length >= 2) {
                const prev = jd.data[jd.data.length - 2];
                obPrevHighLine = obCandleS.createPriceLine({ price: prev.high, color:'#22c55e', lineWidth:2, lineStyle:2, axisLabelVisible:false, title:'' });
                obPrevLowLine  = obCandleS.createPriceLine({ price: prev.low,  color:'#ef4444', lineWidth:2, lineStyle:2, axisLabelVisible:false, title:'' });
            }
        }
    } catch(e) { console.error('OB chart load error:', e); }
}

function connectOBWS() {
    closeOBWS();
    if (!obSymbolName) return;
    obWS = new WebSocket('wss://stream.bybit.com/v5/public/linear');
    obWS.onopen = () => obWS.send(JSON.stringify({ op:'subscribe', args:[`kline.${obTF}.${obSymbolName}`] }));
    obWS.onmessage = ev => {
        let msg; try { msg = JSON.parse(ev.data); } catch(e) { return; }
        if (!msg.topic || !msg.topic.startsWith('kline.')) return;
        const b = msg.data[0];
        const confirmed = b.confirm === true || b.confirm === 'true';
        const candle = { time: Math.floor(parseInt(b.start)/1000), open: parseFloat(b.open), high: parseFloat(b.high), low: parseFloat(b.low), close: parseFloat(b.close) };
        obCandleS.update(candle);
        for (const {p} of EMA_CFG) {
            if (obLastEMA[p] == null) continue;
            const k = 2/(p+1);
            const live = candle.close * k + obLastEMA[p] * (1-k);
            obEmaS[p].update({ time: candle.time, value: live });
            if (confirmed) obLastEMA[p] = live;
        }
    };
    obWS.onerror = () => {};
    obWS.onclose = () => { obWsTimer = setTimeout(connectOBWS, 5000); };
}

function closeOBWS() {
    clearTimeout(obWsTimer);
    if (obWS) { try { obWS.close(); } catch(e) {} obWS = null; }
}

function openOBModal(symbol) {
    if (!symbol) return;
    const changed = symbol !== obSymbolName;
    obSymbolName = symbol;
    document.getElementById('ob-chart-sym').textContent = symbol.replace('USDT','');
    document.getElementById('ob-iframe').src = `orderbook?symbol=${symbol}`;
    document.getElementById('ob-modal').style.display = 'flex';
    // Reset book panel to visible state
    toggleOBBook(true);
    initOBChart();
    renderOBTFBar();
    if (changed) {
        closeOBWS();
        _clearOBLines();
        obCandleS.setData([]);
        for (const {p} of EMA_CFG) obEmaS[p].setData([]);
        obLastEMA = {};
        loadOBData().then(() => connectOBWS());
    } else if (!obWS || obWS.readyState !== WebSocket.OPEN) {
        connectOBWS();
    }
}

function closeOBModal() {
    document.getElementById('ob-modal').style.display = 'none';
    document.getElementById('ob-iframe').src = '';
    closeOBWS();
    if (obCandleS) {
        _clearOBLines();
        obCandleS.setData([]);
        for (const {p} of EMA_CFG) obEmaS[p].setData([]);
        obLastEMA = {};
    }
    obSymbolName = null;
}

// Receive messages from OB iframe
window.addEventListener('message', e => {
    if (!e.data) return;
    if (e.data.type === 'ob_book_toggle') { toggleOBBook(e.data.visible); return; }
    if (e.data.type !== 'ob_levels' || !obCandleS) return;
    const { bid, ask } = e.data;
    if (obBidLine) { try { obCandleS.removePriceLine(obBidLine); } catch(e) {} obBidLine = null; }
    if (obAskLine) { try { obCandleS.removePriceLine(obAskLine); } catch(e) {} obAskLine = null; }
    if (bid != null) obBidLine = obCandleS.createPriceLine({ price: bid, color:'#10b981', lineWidth:2, lineStyle:1, axisLabelVisible:true, title:'Bid' });
    if (ask != null) obAskLine = obCandleS.createPriceLine({ price: ask, color:'#ef4444', lineWidth:2, lineStyle:1, axisLabelVisible:true, title:'Ask' });
});

document.addEventListener('keydown', e => {
    if (e.key === 'Escape') {
        const obModal = document.getElementById('ob-modal');
        if (obModal && obModal.style.display !== 'none') { closeOBModal(); return; }
    }
}, true);

// OB book panel toggle (triggered by BOOK btn inside iframe via postMessage, or by header btn)
let _obBookVisible = true;
function toggleOBBook(force) {
    _obBookVisible = (force !== undefined) ? force : !_obBookVisible;
    const panel  = document.getElementById('ob-book-panel');
    const handle = document.getElementById('ob-panel-resize');
    const btn    = document.getElementById('ob-book-btn');
    if (_obBookVisible) {
        panel.style.display  = 'flex';
        handle.style.display = '';
        document.getElementById('ob-chart-panel').style.flexBasis = '50%';
        panel.style.flexBasis = '50%';
        if (btn) { btn.style.background = '#1d4ed8'; btn.style.color = '#fff'; }
    } else {
        panel.style.display  = 'none';
        handle.style.display = 'none';
        document.getElementById('ob-chart-panel').style.flexBasis = '100%';
        if (btn) { btn.style.background = 'transparent'; btn.style.color = '#6B7280'; }
    }
    if (obChart) obChart.timeScale().fitContent();
}

// OB modal panel resize — event delegation (ob-panel-resize è sotto nello stesso script block)
let _obRes = false, _obResX = 0, _obResW = 0;
document.addEventListener('mousedown', e => {
    if (e.target.id !== 'ob-panel-resize') return;
    _obRes = true;
    _obResX = e.clientX;
    _obResW = document.getElementById('ob-chart-panel').getBoundingClientRect().width;
    document.body.style.userSelect = 'none';
    e.target.style.background = 'rgba(59,130,246,0.4)';
    // overlay trasparente per bloccare capture dell'iframe durante drag
    const ov = document.createElement('div');
    ov.id = 'ob-drag-ov';
    ov.style.cssText = 'position:fixed;inset:0;z-index:9999;cursor:col-resize;';
    document.body.appendChild(ov);
    e.preventDefault();
});
document.addEventListener('mousemove', e => {
    if (!_obRes) return;
    const totalW = document.getElementById('ob-modal').getBoundingClientRect().width - 5;
    const newW = Math.max(200, Math.min(totalW - 200, _obResW + (e.clientX - _obResX)));
    document.getElementById('ob-chart-panel').style.flexBasis = newW + 'px';
    document.getElementById('ob-book-panel').style.flexBasis = (totalW - newW) + 'px';
    if (obChart) obChart.applyOptions({});
});
document.addEventListener('mouseup', () => {
    if (!_obRes) return;
    _obRes = false;
    document.body.style.userSelect = '';
    const h = document.getElementById('ob-panel-resize');
    if (h) h.style.background = 'transparent';
    const ov = document.getElementById('ob-drag-ov');
    if (ov) ov.remove();
});
</script>

<!-- Order Book fullscreen modal -->
<div id="ob-modal"
     style="display:none;position:fixed;inset:0;z-index:500;flex-direction:row;background:#0F0F0F;">
    <!-- Left: chart -->
    <div id="ob-chart-panel" style="flex-basis:50%;min-width:200px;display:flex;flex-direction:column;">
        <div style="height:36px;flex-shrink:0;background:#0F0F0F;border-bottom:2px solid #2C2C2C;display:flex;align-items:center;padding:0 10px;gap:10px;">
            <span id="ob-chart-sym" style="font-size:13px;font-weight:700;color:#E5E7EB;min-width:60px;"></span>
            <div id="ob-tf-bar" style="display:flex;gap:4px;"></div>
            <div style="flex:1;"></div>
            <button id="ob-book-btn" onclick="toggleOBBook()" style="background:#1d4ed8;color:#fff;border:1px solid #2563eb;border-radius:4px;padding:3px 10px;font-size:11px;font-weight:600;cursor:pointer;">BOOK</button>
            <button onclick="closeOBModal()" style="background:none;border:none;color:#6B7280;font-size:18px;cursor:pointer;padding:0 4px;line-height:1;">✕</button>
        </div>
        <div id="ob-chart-el" style="flex:1;min-height:0;"></div>
    </div>
    <!-- Resize handle -->
    <div id="ob-panel-resize" style="width:5px;flex-shrink:0;cursor:col-resize;background:transparent;border-left:1px solid #2A2E39;transition:background 0.15s;"
         onmouseenter="this.style.background='rgba(59,130,246,0.35)'" onmouseleave="if(!_obRes)this.style.background='transparent'"></div>
    <!-- Right: order book -->
    <div id="ob-book-panel" style="flex-basis:50%;min-width:200px;display:flex;flex-direction:column;background:#0F0F0F;">
        <iframe id="ob-iframe" src="" style="flex:1;border:none;width:100%;height:100%;"></iframe>
    </div>
</div>
