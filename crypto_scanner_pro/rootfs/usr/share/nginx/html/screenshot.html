<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background:#0B0E11; color:#9CA3AF;
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
    width:1280px; height:720px; overflow:hidden;
    display:flex; flex-direction:column;
  }
  #hdr {
    height:40px; flex-shrink:0;
    background:#161A1E; border-bottom:1px solid #2B3139;
    display:flex; align-items:center; gap:10px; padding:0 16px;
  }
  #chart-wrap { flex:1; position:relative; min-height:0; }
  #chart      { position:absolute; inset:0; }
</style>
<script src="https://unpkg.com/lightweight-charts@5/dist/lightweight-charts.standalone.production.js"></script>
</head>
<body>

<div id="hdr">
  <span id="h-coin"   style="font-size:15px;font-weight:700;color:#E5E7EB;"></span>
  <span id="h-change" style="font-size:13px;font-weight:600;"></span>
  <span style="color:#374151;font-size:12px;">|</span>
  <span id="h-vol"    style="font-size:11px;color:#60a5fa;"></span>
  <span style="color:#374151;font-size:12px;">|</span>
  <span id="h-tf"     style="font-size:11px;color:#9CA3AF;background:#1E2329;padding:2px 7px;border-radius:3px;"></span>
  <div style="flex:1;"></div>
  <span id="h-price"  style="font-size:12px;color:#E5E7EB;font-family:monospace;"></span>
  <span style="color:#374151;font-size:12px;margin:0 6px;">|</span>
  <span id="h-time"   style="font-size:10px;color:#6B7280;"></span>
</div>

<div id="chart-wrap"><div id="chart"></div></div>

<script>
const LC  = LightweightCharts;
const qp  = new URLSearchParams(location.search);
const SYM = qp.get('symbol') || 'BTCUSDT';
const TF  = qp.get('interval') || '30';
const SIG       = qp.get('signal_type') || '';
const SIG_PRICE = parseFloat(qp.get('signal_price') || '0');
const SIG_COND  = qp.get('signal_condition') || 'above';

const TF_LABEL = {'1':'1m','5':'5m','15':'15m','30':'30m','60':'1h','240':'4h','D':'1D'};
const EMA_CFG  = [
  {p:5,   color:'#ef4444', width:2},
  {p:10,  color:'#fbbf24', width:2},
  {p:60,  color:'#3b82f6', width:3},
  {p:223, color:'#a855f7', width:2.5},
];

function calcEMA(bars, period) {
  const k = 2/(period+1); let v = bars[0].close;
  return bars.map((b,i) => { if(i>0) v = b.close*k+v*(1-k); return {time:b.time,value:v}; });
}

function addS(chart, type, opts) {
  if (typeof chart.addSeries==='function' && LC[type]) return chart.addSeries(LC[type], opts);
  const m = {CandlestickSeries:'addCandlestickSeries',LineSeries:'addLineSeries'};
  return chart[m[type]](opts);
}

function fmtVol(v) {
  if (v>=1e9) return '$'+(v/1e9).toFixed(1)+'B';
  if (v>=1e6) return '$'+(v/1e6).toFixed(0)+'M';
  return '$'+(v/1e3).toFixed(0)+'K';
}

function fmtPrice(p) {
  if (p>=10000) return p.toLocaleString('en-US',{maximumFractionDigits:1});
  if (p>=1)     return p.toFixed(3);
  if (p>=0.01)  return p.toFixed(5);
  return p.toFixed(7);
}

async function init() {
  const coin = SYM.replace('USDT','');
  document.getElementById('h-coin').textContent = coin+'/USDT';
  document.getElementById('h-tf').textContent   = TF_LABEL[TF] || TF;
  const now = new Date();
  document.getElementById('h-time').textContent =
    now.getUTCHours().toString().padStart(2,'0') + ':' +
    now.getUTCMinutes().toString().padStart(2,'0') + ' UTC';

  const chart = LC.createChart(document.getElementById('chart'), {
    autoSize: true,
    layout: { background:{color:'#0B0E11'}, textColor:'#9CA3AF', fontSize:11 },
    grid:   { vertLines:{color:'#1E2329'}, horzLines:{color:'#1E2329'} },
    crosshair: { mode: LC.CrosshairMode ? LC.CrosshairMode.Normal : 1 },
    rightPriceScale: { borderColor:'#2B3139', scaleMargins:{top:0.05,bottom:0.05} },
    timeScale: {
      borderColor:'#2B3139', visible:true, timeVisible:true,
      secondsVisible:false, barSpacing:6, rightOffset:30,
    },
  });

  const candleS = addS(chart, 'CandlestickSeries', {
    upColor:'#26a69a', downColor:'#ef5350',
    borderVisible:false, wickUpColor:'#26a69a', wickDownColor:'#ef5350',
  });
  const lineBase = {priceLineVisible:false, lastValueVisible:false, crosshairMarkerVisible:false, autoscaleInfoProvider: () => null};
  const emaS = {};
  for (const {p,color,width} of EMA_CFG)
    emaS[p] = addS(chart, 'LineSeries', {...lineBase, color, lineWidth:width});

  try {
    const [rk, rd, rt] = await Promise.all([
      fetch(`api/klines?symbol=${SYM}&interval=${TF}`),
      fetch(`api/klines?symbol=${SYM}&interval=D`),
      fetch(`api/ticker?symbol=${SYM}`),
    ]);

    const jk = await rk.json();
    const jd = await rd.json();
    const jt = await rt.json().catch(()=>null);

    if (jt && jt.success) {
      const pct = jt.change_24h;
      const el  = document.getElementById('h-change');
      el.textContent = (pct>=0?'+':'')+pct.toFixed(2)+'%';
      el.style.color = pct>=0 ? '#34d399' : '#f87171';
      document.getElementById('h-vol').textContent   = fmtVol(jt.volume_24h);
      document.getElementById('h-price').textContent = fmtPrice(jt.price);
    }

    if (jk.success) {
      const klines = jk.data;
      candleS.setData(klines);
      for (const {p} of EMA_CFG) emaS[p].setData(calcEMA(klines, p));

      if (jd.success && jd.data && jd.data.length >= 2) {
        const today = jd.data[jd.data.length-1];
        const prev  = jd.data[jd.data.length-2];
        candleS.createPriceLine({price:today.high,color:'#22c55e',lineWidth:2,lineStyle:0,axisLabelVisible:true,title:'H'});
        candleS.createPriceLine({price:today.low, color:'#ef4444',lineWidth:2,lineStyle:0,axisLabelVisible:true,title:'L'});
        candleS.createPriceLine({price:prev.high, color:'#22c55e',lineWidth:2,lineStyle:2,axisLabelVisible:true,title:'pH'});
        candleS.createPriceLine({price:prev.low,  color:'#ef4444',lineWidth:2,lineStyle:2,axisLabelVisible:true,title:'pL'});
      }

      if (SIG === 'price' && SIG_PRICE > 0) {
        const clr = SIG_COND === 'above' ? '#34d399' : '#f87171';
        const lbl = SIG_COND === 'above' ? 'TARGET ▲' : 'TARGET ▼';
        candleS.createPriceLine({
          price:SIG_PRICE, color:clr, lineWidth:2,
          lineStyle: LC.LineStyle ? LC.LineStyle.Dashed : 2,
          axisLabelVisible:true, title:lbl,
        });
      }

      const len = klines.length;
      const visibleBars = TF === 'D' ? 50 : TF === '240' ? 65 : 80;
      chart.timeScale().setVisibleLogicalRange({ from: len - visibleBars, to: len + 8 });
    }
  } catch(e) {
    console.error('Chart init error:', e);
  }

  document.body.dataset.ready = '1';
}

init();
</script>
</body>
</html>
