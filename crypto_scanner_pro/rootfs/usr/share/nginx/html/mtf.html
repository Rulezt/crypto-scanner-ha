<!DOCTYPE html>
<html lang="it" class="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MTF View</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<script src="https://unpkg.com/lightweight-charts@5/dist/lightweight-charts.standalone.production.js"></script>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background:#0F0F0F; color:#B2B5BE;
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
    height:100vh; display:flex; flex-direction:column; overflow:hidden;
  }
  #hdr {
    height:44px; flex-shrink:0;
    background:#0F0F0F; border-bottom:2px solid #2C2C2C;
    display:flex; align-items:center; gap:8px; padding:0 14px;
  }
  #grid {
    flex:1; display:grid;
    grid-template-columns: repeat(4, 1fr);
    grid-template-rows: 1fr 1fr;
    overflow:hidden; min-height:0;
  }
  .cell {
    display:flex; flex-direction:column;
    border:1px solid #2A2E39; overflow:hidden;
  }
  .cell-hdr {
    height:26px; flex-shrink:0;
    display:flex; align-items:center; gap:5px;
    padding:0 7px; background:#0F0F0F;
    border-bottom:2px solid #2C2C2C;
  }
  .cell-body { flex:1; position:relative; min-height:0; }
  .chart-el  { position:absolute; inset:0; }

  @media (max-width: 639px) {
    /* Grid mobile: 1 TF per volta, navigazione via JS */
    #grid {
      grid-template-columns: 1fr !important;
      grid-template-rows: 1fr !important;
    }
    /* Header scrollabile */
    #hdr {
      overflow-x: auto; overflow-y: hidden;
      -webkit-overflow-scrolling: touch;
      height: auto; min-height: 44px;
    }
    #hdr > div[style*="flex:1"] { flex: 0 0 6px !important; min-width: 6px; }
    #mtf-label { display: none; }
    /* OB modal verticale */
    #ob-modal { flex-direction: column !important; }
    #ob-modal > div:first-child {
      flex: 0 0 50% !important;
      border-right: none !important;
      border-bottom: 1px solid #2A2E39;
    }
    #ob-modal > div:last-child { flex: 0 0 50% !important; }
  }
</style>
</head>
<body>

<div id="hdr">
  <button onclick="window.opener ? window.close() : history.length > 1 ? history.back() : location.href='./'"
    style="font-size:11px;color:#B2B5BE;background:#2A2E39;border:none;border-radius:3px;padding:3px 9px;cursor:pointer;line-height:1;flex-shrink:0;">
    ✕
  </button>
  <div style="width:1px;height:22px;background:#2A2E39;flex-shrink:0;"></div>
  <span id="hdr-coin" style="font-size:15px;font-weight:700;color:#E5E7EB;white-space:nowrap;"></span>
  <a id="hdr-bybit" href="#" target="_blank" rel="noopener"
     style="font-size:11px;color:#f59e0b;background:#2A2E39;border:none;border-radius:3px;padding:3px 9px;cursor:pointer;line-height:1;flex-shrink:0;text-decoration:none;white-space:nowrap;"
     title="Apri su Bybit">Bybit ↗</a>
  <span id="hdr-change" style="font-size:12px;font-weight:600;white-space:nowrap;"></span>
  <span style="color:#374151;font-size:11px;">|</span>
  <span id="hdr-vol"    style="font-size:11px;color:#60a5fa;white-space:nowrap;"></span>
  <div style="flex:1;"></div>
  <span id="mtf-label" style="font-size:9px;color:#4B5563;letter-spacing:.8px;text-transform:uppercase;">Multi Timeframe</span>
  <span style="color:#374151;font-size:11px;margin:0 6px;">|</span>
  <button onclick="window.open('orderbook?symbol=' + SYM, '_blank')"
    style="font-size:11px;color:#B2B5BE;background:#2A2E39;border:none;border-radius:3px;padding:3px 9px;cursor:pointer;line-height:1;flex-shrink:0;"
    title="Order Book">
    📖 OB
  </button>
  <span style="color:#374151;font-size:11px;margin:0 6px;">|</span>
  <div id="ws-dot" style="display:flex;align-items:center;gap:5px;">
    <div style="width:7px;height:7px;background:#6B7280;border-radius:50%;transition:background .3s;" id="ws-circle"></div>
    <span style="font-size:10px;color:#6B7280;" id="ws-label">WS</span>
  </div>
</div>

<div id="grid"></div>

<script>
// ── constants ──────────────────────────────────────────────────────────────────
const LC  = LightweightCharts;
let TZ_OFFSET_S = 0;
const SYM = new URLSearchParams(location.search).get('symbol') || 'BTCUSDT';

const isMobile = window.innerWidth < 640;

// Desktop: 4 col × 2 row | Mobile: 2 col × 3 row
const TF_SLOTS = isMobile ? [
  { tf:'D',   label:'1D',  col:'1', row:'1' },
  { tf:'240', label:'4h',  col:'2', row:'1' },
  { tf:'60',  label:'1h',  col:'1', row:'2' },
  { tf:'30',  label:'30m', col:'2', row:'2' },
  { tf:'5',   label:'5m',  col:'1', row:'3' },
  { tf:'1',   label:'1m',  col:'2', row:'3' },
] : [
  { tf:'D',   label:'1D',  col:'1',       row:'1' },
  { tf:'240', label:'4h',  col:'2',       row:'1' },
  { tf:'60',  label:'1h',  col:'3',       row:'1' },
  { tf:'30',  label:'30m', col:'4',       row:'1' },
  { tf:'5',   label:'5m',  col:'1/span 2',row:'2' },
  { tf:'1',   label:'1m',  col:'3/span 2',row:'2' },
];

const DEFAULT_CANDLES = {'1':80,'5':80,'30':60,'60':60,'240':50,'D':40};
function getCandlesForTF(tf) {
  try {
    const s = JSON.parse(localStorage.getItem('chart_candles_per_tf'));
    if (s && s[tf]) return Math.max(20, Math.min(500, parseInt(s[tf])));
  } catch(e) {}
  return DEFAULT_CANDLES[tf] || 60;
}

function getPriceFormat(price) {
  const p = Math.abs(price || 0);
  if (p >= 100)   return { type:'price', precision:2, minMove:0.01 };
  if (p >= 10)    return { type:'price', precision:3, minMove:0.001 };
  if (p >= 1)     return { type:'price', precision:4, minMove:0.0001 };
  if (p >= 0.1)   return { type:'price', precision:5, minMove:0.00001 };
  if (p >= 0.01)  return { type:'price', precision:6, minMove:0.000001 };
  if (p >= 0.001) return { type:'price', precision:7, minMove:0.0000001 };
  return            { type:'price', precision:8, minMove:0.00000001 };
}

const EMA_CFG = [
  {p:5,   color:'#ef4444', width:2},
  {p:10,  color:'#fbbf24', width:2},
  {p:60,  color:'#3b82f6', width:3},
  {p:223, color:'#a855f7', width:2.5},
];

let slots   = [];
let ws      = null;
let wsTimer = null;
let mobileSlotIdx = 0;

// OB fullscreen
const OB_TFS = [
  {tf:'1',label:'1m'},{tf:'5',label:'5m'},{tf:'30',label:'30m'},
  {tf:'60',label:'1h'},{tf:'240',label:'4h'},{tf:'D',label:'1D'},
];
let obChart = null, obCandleS = null, obEmaS = {}, obLastEMA = {};
let obTF = '30', obWS = null, obWsTimer = null;
let obBidLine = null, obAskLine = null;
let obDayHighLine = null, obDayLowLine = null;
let obPrevHighLine = null, obPrevLowLine = null;

// ── Day separator lines ────────────────────────────────────────────────────────
function getDayTimestamps(klines) {
    if (!klines || klines.length < 2) return [];
    const result = [];
    let prevDay = Math.floor(klines[0].time / 86400);
    for (let i = 1; i < klines.length; i++) {
        const day = Math.floor(klines[i].time / 86400);
        if (day !== prevDay) { result.push(klines[i].time); prevDay = day; }
    }
    return result;
}
class DayLinesPrimitive {
    constructor(dayTs, chart) {
        const renderer = {
            draw: target => target.useBitmapCoordinateSpace(({ context: ctx, bitmapSize, horizontalPixelRatio }) => {
                const ts = chart.timeScale();
                ctx.save();
                ctx.strokeStyle = 'rgba(255,255,255,0.08)';
                ctx.lineWidth = horizontalPixelRatio;
                for (const t of dayTs) {
                    const x = ts.timeToCoordinate(t);
                    if (x === null) continue;
                    const xPx = Math.round(x * horizontalPixelRatio) + 0.5;
                    if (xPx < 0 || xPx > bitmapSize.width) continue;
                    ctx.beginPath(); ctx.moveTo(xPx, 0); ctx.lineTo(xPx, bitmapSize.height); ctx.stroke();
                }
                ctx.restore();
            })
        };
        this._view = { renderer: () => renderer, zOrder: () => 'bottom' };
    }
    paneViews() { return [this._view]; }
    updateAllViews() {}
    attached() {}
    detached() {}
}
function attachDayLines(series, chart, klines, tf, prev) {
    if (prev) { try { series.detachPrimitive(prev); } catch(e) {} }
    if (tf === 'D' || !klines || klines.length < 2) return null;
    const dayTs = getDayTimestamps(klines);
    if (!dayTs.length) return null;
    const prim = new DayLinesPrimitive(dayTs, chart);
    try { series.attachPrimitive(prim); return prim; } catch(e) { return null; }
}

// ── helpers ────────────────────────────────────────────────────────────────────
function calcEMA(bars, period) {
  const k = 2/(period+1); let v = bars[0].close;
  return bars.map((b,i) => { if(i>0) v=b.close*k+v*(1-k); return {time:b.time,value:v}; });
}

function addS(chart, type, opts) {
  if (typeof chart.addSeries==='function' && LC[type]) return chart.addSeries(LC[type], opts);
  const m = {CandlestickSeries:'addCandlestickSeries',LineSeries:'addLineSeries'};
  return chart[m[type]](opts);
}

function makeChart(el, bigSlot) {
  return LC.createChart(el, {
    autoSize: true,
    layout: { background:{color:'#0F0F0F'}, textColor:'#B2B5BE', fontSize: bigSlot ? 11 : 10 },
    grid:   { vertLines:{color:'#FFFFFF0F'}, horzLines:{color:'#FFFFFF0F'} },
    crosshair: { mode: LC.CrosshairMode ? LC.CrosshairMode.Normal : 1 },
    rightPriceScale: { borderColor:'#2A2E39', scaleMargins:{top:0.05,bottom:0.05} },
    timeScale: {
      borderColor:'#2A2E39', visible:true, timeVisible:true, secondsVisible:false,
      barSpacing: bigSlot ? 8 : 6, rightOffset: bigSlot ? 20 : 15,
    },
  });
}

function fmtPrice(p) {
  if (p>=10000) return p.toLocaleString('en-US',{maximumFractionDigits:1});
  if (p>=1)     return p.toFixed(3);
  if (p>=0.01)  return p.toFixed(5);
  return p.toFixed(7);
}

function fmtVol(v) {
  if (v>=1e9) return '$'+(v/1e9).toFixed(1)+'B';
  if (v>=1e6) return '$'+(v/1e6).toFixed(0)+'M';
  return '$'+(v/1e3).toFixed(0)+'K';
}

// ── build grid ─────────────────────────────────────────────────────────────────
function buildGrid() {
  const grid = document.getElementById('grid');

  TF_SLOTS.forEach((cfg, i) => {
    const isBig = cfg.row === '2';   // bottom row: wider slot

    const cell = document.createElement('div');
    cell.className = 'cell';
    cell.style.gridColumn = cfg.col;
    cell.style.gridRow    = cfg.row;

    // ── slot header ────────────────────────────────────────────────────────
    const hdr = document.createElement('div');
    hdr.className = 'cell-hdr';

    const tfLbl = document.createElement('span');
    tfLbl.textContent = cfg.label;
    tfLbl.style.cssText = 'font-size:10px;font-weight:700;color:#60a5fa;background:#1E222D;padding:1px 6px;border-radius:2px;flex-shrink:0;';

    const spacer = document.createElement('div');
    spacer.style.flex = '1';

    const pctEl = document.createElement('span');
    pctEl.style.cssText = 'font-size:10px;font-family:monospace;min-width:52px;text-align:right;white-space:nowrap;';

    const resetBtn = document.createElement('button');
    resetBtn.textContent = '↺'; resetBtn.title = 'Reset zoom';
    resetBtn.style.cssText = 'font-size:12px;color:#4B5563;background:none;border:none;cursor:pointer;padding:0;line-height:1;flex-shrink:0;transition:color .15s;';
    resetBtn.onmouseenter = () => resetBtn.style.color = '#B2B5BE';
    resetBtn.onmouseleave = () => resetBtn.style.color = '#4B5563';
    resetBtn.onclick = () => { const s = slots[i]; if(s && s.chart) s.chart.timeScale().setVisibleLogicalRange({ from: s.klineCount - getCandlesForTF(s.cfg.tf), to: s.klineCount + 3 }); };

    const fsBtn = document.createElement('button');
    fsBtn.textContent = '⛶'; fsBtn.title = 'Schermo intero';
    fsBtn.style.cssText = 'font-size:12px;color:#4B5563;background:none;border:none;cursor:pointer;padding:0 0 0 4px;line-height:1;flex-shrink:0;transition:color .15s;';
    fsBtn.onmouseenter = () => fsBtn.style.color = '#B2B5BE';
    fsBtn.onmouseleave = () => fsBtn.style.color = '#4B5563';
    fsBtn.onclick = () => openFSModal(i);

    const rangeBtn = document.createElement('button');
    rangeBtn.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 28 28" width="12" height="12" style="vertical-align:middle"><g fill="currentColor"><path fill-rule="nonzero" d="M4 5h16.5v-1h-16.5zM25 24h-16.5v1h16.5z"></path><path fill-rule="nonzero" d="M6.5 26c.828 0 1.5-.672 1.5-1.5s-.672-1.5-1.5-1.5-1.5.672-1.5 1.5.672 1.5 1.5 1.5zm0 1c-1.381 0-2.5-1.119-2.5-2.5s1.119-2.5 2.5-2.5 2.5 1.119 2.5 2.5-1.119 2.5-2.5 2.5zM22.5 6c.828 0 1.5-.672 1.5-1.5s-.672-1.5-1.5-1.5-1.5.672-1.5 1.5.672 1.5 1.5 1.5zm0 1c-1.381 0-2.5-1.119-2.5-2.5s1.119-2.5 2.5-2.5 2.5 1.119 2.5 2.5-1.119 2.5-2.5 2.5z"></path><path fill-rule="nonzero" d="M14 9v14h1v-14z"></path><path d="M14.5 6l2.5 3h-5z"></path></g></svg>'; rangeBtn.title = 'Range Prezzo';
    rangeBtn.style.cssText = 'font-size:11px;color:#4B5563;background:none;border:none;cursor:pointer;padding:0;line-height:1;flex-shrink:0;transition:color .15s;';
    rangeBtn.onmouseenter = () => { if (!slots[i]?.rangeActive) rangeBtn.style.color = '#B2B5BE'; };
    rangeBtn.onmouseleave = () => { if (!slots[i]?.rangeActive) rangeBtn.style.color = '#4B5563'; };
    rangeBtn.onclick = () => toggleSlotRange(i);
    hdr.append(tfLbl, spacer, pctEl, resetBtn, rangeBtn, fsBtn);
    cell.appendChild(hdr);

    // ── chart body ─────────────────────────────────────────────────────────
    const body = document.createElement('div');
    body.className = 'cell-body';
    const chartEl = document.createElement('div');
    chartEl.className = 'chart-el';
    body.appendChild(chartEl);
    const rangeCanvas = document.createElement('canvas');
    rangeCanvas.style.cssText = 'position:absolute;inset:0;width:100%;height:100%;pointer-events:none;z-index:5;';
    body.appendChild(rangeCanvas);
    cell.appendChild(body);
    if (isMobile) cell.style.display = i === 0 ? 'flex' : 'none';
    grid.appendChild(cell);

    // ── create chart ───────────────────────────────────────────────────────
    const chart   = makeChart(chartEl, isBig);
    const candleS = addS(chart, 'CandlestickSeries', {
      upColor:'#089981', downColor:'#F23645',
      borderVisible:false, wickUpColor:'#089981', wickDownColor:'#F23645',
    });
    const lineBase = {priceLineVisible:false, lastValueVisible:false, crosshairMarkerVisible:false};
    const emaS = {};
    for (const {p,color,width} of EMA_CFG)
      emaS[p] = addS(chart, 'LineSeries', {...lineBase, color, lineWidth:width});

    // Crosshair → candle % change
    chart.subscribeCrosshairMove(param => {
      if (!param || !param.seriesData) { pctEl.textContent = ''; return; }
      const cd = param.seriesData.get(candleS);
      if (cd && cd.open != null) {
        const pct = ((cd.close - cd.open) / cd.open) * 100;
        pctEl.textContent = (pct>=0?'+':'')+pct.toFixed(2)+'%';
        pctEl.style.color = pct>=0 ? '#34d399' : '#f87171';
      } else {
        pctEl.textContent = '';
      }
    });

    slots.push({
      cfg, chart, candleS, emaS, cell, rangeCanvas, rangeBtn,
      klineCount: 0,
      lastEMA: {5:null,10:null,60:null,223:null},
      dayHighLine:null, dayLowLine:null,
      prevHighLine:null, prevLowLine:null,
      rangeActive: false, rangeP1: null, rangeP2: null, _rangeSub: null, _rangeCsSub: null,
      dayPrimitive: null,
    });
  });
}

// ── data loading ───────────────────────────────────────────────────────────────
async function loadAll() {
  // Header ticker
  try {
    const rt = await fetch(`api/ticker?symbol=${SYM}`);
    const jt = await rt.json();
    const coin = SYM.replace('USDT','');
    document.getElementById('hdr-coin').textContent = coin;
    document.getElementById('hdr-bybit').href = `https://www.bybit.com/trade/usdt/${SYM}`;
    if (jt.success) {
      const pct = jt.change_24h;
      const el  = document.getElementById('hdr-change');
      el.textContent = (pct>=0?'+':'')+pct.toFixed(2)+'%';
      el.style.color = pct>=0 ? '#34d399' : '#f87171';
      document.getElementById('hdr-vol').textContent = fmtVol(jt.volume_24h);
    }
  } catch(e) {
    document.getElementById('hdr-coin').textContent = SYM.replace('USDT','');
    document.getElementById('hdr-bybit').href = `https://www.bybit.com/trade/usdt/${SYM}`;
  }

  // Daily H/L for all charts
  let dailyData = null;
  try {
    const rd = await fetch(`api/klines?symbol=${SYM}&interval=D`);
    const jd = await rd.json();
    if (jd.success && jd.data && jd.data.length >= 2)
      dailyData = { today: jd.data[jd.data.length-1], prev: jd.data[jd.data.length-2] };
  } catch(e) {}

  // Load all slots in parallel
  await Promise.all(slots.map((_, i) => loadSlot(i, dailyData)));
  openWS();
}

async function loadSlot(idx, dailyData) {
  const s = slots[idx];
  try {
    const r = await fetch(`api/klines?symbol=${SYM}&interval=${s.cfg.tf}`);
    const j = await r.json();
    if (!j.success) return;
    const klines = j.data; if (!TZ_OFFSET_S && j.utc_offset_s) TZ_OFFSET_S = j.utc_offset_s;
    s.candleS.setData(klines);
    s.klineCount = klines.length;
    s.dayPrimitive = attachDayLines(s.candleS, s.chart, klines, s.cfg.tf, s.dayPrimitive);
    s.candleS.applyOptions({ priceFormat: getPriceFormat(klines[klines.length-1]?.close) });
    for (const {p} of EMA_CFG) {
      const ema = calcEMA(klines, p);
      s.emaS[p].setData(ema);
      s.lastEMA[p] = ema[ema.length-1].value;
    }
    s.chart.timeScale().setVisibleLogicalRange({ from: klines.length - getCandlesForTF(s.cfg.tf), to: klines.length + 3 });

    // H / L / pH / pL lines
    if (dailyData) {
      const {today, prev} = dailyData;
      s.dayHighLine  = s.candleS.createPriceLine({price:today.high,color:'#22c55e',lineWidth:1,lineStyle:0,axisLabelVisible:false,title:''});
      s.dayLowLine   = s.candleS.createPriceLine({price:today.low, color:'#ef4444',lineWidth:1,lineStyle:0,axisLabelVisible:false,title:''});
      s.prevHighLine = s.candleS.createPriceLine({price:prev.high, color:'#22c55e',lineWidth:1,lineStyle:2,axisLabelVisible:false,title:''});
      s.prevLowLine  = s.candleS.createPriceLine({price:prev.low,  color:'#ef4444',lineWidth:1,lineStyle:2,axisLabelVisible:false,title:''});
    }
  } catch(e) {
    console.error(`MTF load ${s.cfg.label} error:`, e);
  }
}

// ── WebSocket ──────────────────────────────────────────────────────────────────
function openWS() {
  closeWS();
  setWSDot('connecting');
  ws = new WebSocket('wss://stream.bybit.com/v5/public/linear');
  ws.onopen = () => {
    setWSDot('live');
    ws.send(JSON.stringify({
      op: 'subscribe',
      args: TF_SLOTS.map(s => `kline.${s.tf}.${SYM}`),
    }));
  };
  ws.onmessage = ev => {
    let msg; try { msg = JSON.parse(ev.data); } catch(e) { return; }
    if (!msg.topic || !msg.topic.startsWith('kline.')) return;
    const tf    = msg.topic.split('.')[1];
    const idx   = slots.findIndex(s => s.cfg.tf === tf);
    if (idx === -1) return;
    const b = msg.data[0];
    const confirmed = b.confirm === true || b.confirm === 'true';
    const candle = {
      time:  Math.floor(parseInt(b.start)/1000) + TZ_OFFSET_S,
      open:  parseFloat(b.open),
      high:  parseFloat(b.high),
      low:   parseFloat(b.low),
      close: parseFloat(b.close),
    };
    const s = slots[idx];
    s.candleS.update(candle);
    for (const {p} of EMA_CFG) {
      if (s.lastEMA[p] === null) continue;
      const k    = 2/(p+1);
      const live = candle.close * k + s.lastEMA[p] * (1-k);
      s.emaS[p].update({time: candle.time, value: live});
      if (confirmed) s.lastEMA[p] = live;
    }
  };
  ws.onerror = () => setWSDot('error');
  ws.onclose = () => { setWSDot('off'); wsTimer = setTimeout(openWS, 5000); };
}

function closeWS() {
  clearTimeout(wsTimer);
  if (ws) { try { ws.close(); } catch(e) {} ws = null; }
}

function setWSDot(state) {
  const m = {
    connecting: ['#eab308', 'Conn...', '#B2B5BE'],
    live:       ['#34d399', 'Live',    '#34d399'],
    error:      ['#ef4444', 'Err',     '#ef4444'],
    off:        ['#6B7280', 'WS',      '#6B7280'],
  };
  const [bg, label, tc] = m[state] || m.off;
  const c = document.getElementById('ws-circle');
  const l = document.getElementById('ws-label');
  if (c) c.style.background = bg;
  if (l) { l.textContent = label; l.style.color = tc; }
}

window.addEventListener('beforeunload', closeWS);

// ── Order Book fullscreen ─────────────────────────────────────────────────────
function initOBChart() {
    if (obChart) return;
    obChart   = makeChart(document.getElementById('ob-chart-el'), true);
    obCandleS = addS(obChart, 'CandlestickSeries', {
        upColor:'#089981', downColor:'#F23645',
        borderVisible:false, wickUpColor:'#089981', wickDownColor:'#F23645',
    });
    const lineBase = { priceLineVisible:false, lastValueVisible:false, crosshairMarkerVisible:false };
    for (const {p, color, width} of EMA_CFG)
        obEmaS[p] = addS(obChart, 'LineSeries', {...lineBase, color, lineWidth:width+0.5});
}

function connectOBWS() {
    closeOBWS();
    obWS = new WebSocket('wss://stream.bybit.com/v5/public/linear');
    obWS.onopen = () => obWS.send(JSON.stringify({ op:'subscribe', args:[`kline.${obTF}.${SYM}`] }));
    obWS.onmessage = ev => {
        let msg; try { msg = JSON.parse(ev.data); } catch(e) { return; }
        if (!msg.topic || !msg.topic.startsWith('kline.')) return;
        const b = msg.data[0];
        const confirmed = b.confirm === true || b.confirm === 'true';
        const candle = { time: Math.floor(parseInt(b.start)/1000) + TZ_OFFSET_S, open: parseFloat(b.open), high: parseFloat(b.high), low: parseFloat(b.low), close: parseFloat(b.close) };
        obCandleS.update(candle);
        for (const {p} of EMA_CFG) {
            if (obLastEMA[p] == null) continue;
            const k = 2/(p+1);
            const live = candle.close * k + obLastEMA[p] * (1-k);
            obEmaS[p].update({ time: candle.time, value: live });
            if (confirmed) obLastEMA[p] = live;
        }
    };
    obWS.onerror = () => {};
    obWS.onclose = () => { obWsTimer = setTimeout(connectOBWS, 5000); };
}

function _drawRangeCanvas(canvas, series, p1, p2) {
  canvas.width  = canvas.clientWidth  || canvas.parentElement.clientWidth  || 100;
  canvas.height = canvas.clientHeight || canvas.parentElement.clientHeight || 100;
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  if (p1 === null || p2 === null) return;

  let y1 = series.priceToCoordinate(p1);
  let y2 = series.priceToCoordinate(p2);
  if (y1 === null) y1 = p2 > p1 ? canvas.height : 0;
  if (y2 === null) y2 = p2 > p1 ? 0 : canvas.height;

  const top    = Math.min(y1, y2);
  const bottom = Math.max(y1, y2);
  const h      = Math.max(bottom - top, 1);
  const isUp   = p2 > p1;
  const color  = isUp ? '#089981' : '#F23645';

  ctx.fillStyle = isUp ? 'rgba(8,153,129,0.12)' : 'rgba(242,54,69,0.12)';
  ctx.fillRect(0, top, canvas.width, h);

  ctx.strokeStyle = color;
  ctx.lineWidth = 1;
  ctx.setLineDash([5, 3]);
  ctx.beginPath(); ctx.moveTo(0, y1); ctx.lineTo(canvas.width, y1); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(0, y2); ctx.lineTo(canvas.width, y2); ctx.stroke();
  ctx.setLineDash([]);

  const delta    = p2 - p1;
  const pct      = (delta / p1) * 100;
  const sign     = delta >= 0 ? '+' : '';
  const absDelta = Math.abs(delta);
  const dStr     = absDelta >= 100 ? delta.toFixed(1) : absDelta >= 1 ? delta.toFixed(2) : delta.toFixed(4);
  const label    = `${sign}${dStr}  (${sign}${pct.toFixed(2)}%)`;

  const fs  = Math.max(9, Math.min(12, Math.floor(h * 0.35)));
  ctx.font  = `bold ${fs}px monospace`;
  const tw  = ctx.measureText(label).width;
  const pad = 4;
  const lx  = canvas.width - tw - pad * 2 - 6;
  const ly  = top + h / 2;

  ctx.fillStyle = isUp ? 'rgba(8,153,129,0.88)' : 'rgba(242,54,69,0.88)';
  ctx.beginPath();
  ctx.roundRect ? ctx.roundRect(lx - pad, ly - fs, tw + pad * 2, fs + 6, 3)
                : ctx.rect(lx - pad, ly - fs, tw + pad * 2, fs + 6);
  ctx.fill();
  ctx.fillStyle = '#ffffff';
  ctx.fillText(label, lx, ly);
}

function toggleSlotRange(idx) {
  const s = slots[idx];
  s.rangeActive = !s.rangeActive;
  s.rangeBtn.style.color = s.rangeActive ? '#f59e0b' : '#4B5563';
  if (!s.rangeActive) {
    s.rangeP1 = null; s.rangeP2 = null;
    try { const rc = s.rangeCanvas.getContext('2d'); rc.clearRect(0,0,s.rangeCanvas.width,s.rangeCanvas.height); } catch(e) {}
    if (s._rangeSub)   { try { s.chart.unsubscribeClick(s._rangeSub); }          catch(e){} s._rangeSub   = null; }
    if (s._rangeCsSub) { try { s.chart.unsubscribeCrosshairMove(s._rangeCsSub); } catch(e){} s._rangeCsSub = null; }
  } else {
    s.rangeP1 = null; s.rangeP2 = null;
    s._rangeSub = param => {
      if (!param.point) return;
      const price = s.candleS.coordinateToPrice(param.point.y);
      if (price == null) return;
      if (s.rangeP1 === null || s.rangeP2 !== null) { s.rangeP1 = price; s.rangeP2 = null; }
      else { s.rangeP2 = price; _drawRangeCanvas(s.rangeCanvas, s.candleS, s.rangeP1, s.rangeP2); }
    };
    s._rangeCsSub = param => {
      if (s.rangeP2 !== null) return;
      const p2 = param.point ? s.candleS.coordinateToPrice(param.point.y) : null;
      _drawRangeCanvas(s.rangeCanvas, s.candleS, s.rangeP1, p2);
    };
    s.chart.subscribeClick(s._rangeSub);
    s.chart.subscribeCrosshairMove(s._rangeCsSub);
  }
}

function toggleFsRange() {
  fsRangeActive = !fsRangeActive;
  const btn    = document.getElementById('fs-range-btn');
  const canvas = document.getElementById('fs-range-canvas');
  btn.style.color      = fsRangeActive ? '#f59e0b' : '#B2B5BE';
  canvas.style.display = fsRangeActive ? 'block' : 'none';
  if (!fsRangeActive) {
    fsRangeP1 = null; fsRangeP2 = null;
    try { const rc = canvas.getContext('2d'); rc.clearRect(0,0,canvas.width,canvas.height); } catch(e) {}
    if (_fsRangeSub)   { try { fsChart.unsubscribeClick(_fsRangeSub); }          catch(e){} _fsRangeSub   = null; }
    if (_fsRangeCsSub) { try { fsChart.unsubscribeCrosshairMove(_fsRangeCsSub); } catch(e){} _fsRangeCsSub = null; }
  } else {
    fsRangeP1 = null; fsRangeP2 = null;
    _fsRangeSub = param => {
      if (!param.point) return;
      const price = fsCandleS.coordinateToPrice(param.point.y);
      if (price == null) return;
      if (fsRangeP1 === null || fsRangeP2 !== null) { fsRangeP1 = price; fsRangeP2 = null; }
      else { fsRangeP2 = price; _drawRangeCanvas(canvas, fsCandleS, fsRangeP1, fsRangeP2); }
    };
    _fsRangeCsSub = param => {
      if (fsRangeP2 !== null) return;
      const p2 = param.point ? fsCandleS.coordinateToPrice(param.point.y) : null;
      _drawRangeCanvas(canvas, fsCandleS, fsRangeP1, p2);
    };
    fsChart.subscribeClick(_fsRangeSub);
    fsChart.subscribeCrosshairMove(_fsRangeCsSub);
  }
}

<!-- Order Book fullscreen modal -->
<div id="ob-modal"
     style="display:none;position:fixed;inset:0;z-index:500;flex-direction:row;background:#0F0F0F;">
    <!-- Left: chart -->
    <div style="flex:1;min-width:0;display:flex;flex-direction:column;border-right:1px solid #2A2E39;">
        <div style="height:36px;flex-shrink:0;background:#0F0F0F;border-bottom:2px solid #2C2C2C;display:flex;align-items:center;padding:0 10px;gap:10px;">
            <span id="ob-chart-sym" style="font-size:13px;font-weight:700;color:#E5E7EB;min-width:60px;"></span>
            <div id="ob-tf-bar" style="display:flex;gap:4px;"></div>
            <div style="flex:1;"></div>
            <button onclick="closeOBModal()" style="background:none;border:none;color:#6B7280;font-size:18px;cursor:pointer;padding:0 4px;line-height:1;">✕</button>
        </div>
        <div id="ob-chart-el" style="flex:1;min-height:0;"></div>
    </div>
    <!-- Right: order book -->
    <div style="flex:1;min-width:0;display:flex;flex-direction:column;background:#0F0F0F;">
        <iframe id="ob-iframe" src="" style="flex:1;border:none;width:100%;height:100%;"></iframe>
    </div>
</div>

</body>
</html>
