<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Book</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="stylesheet" href="orderbook-styles.css">
    <script src="https://unpkg.com/lightweight-charts@5/dist/lightweight-charts.standalone.production.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/vue@3.4.21/dist/vue.global.prod.js"></script>
    <script defer src="orderbook.js"></script>
    <style>
        /* ===== HORIZONTAL IMBALANCE BAR ===== */
        .imbalance-hbar {
            display: flex;
            align-items: center;
            height: 28px;
            background: #0f1117;
            border-bottom: 1px solid rgba(255,255,255,0.07);
            padding: 0 8px;
            gap: 8px;
            flex-shrink: 0;
        }
        .imh-label {
            display: flex;
            align-items: center;
            gap: 4px;
            min-width: 90px;
            white-space: nowrap;
            font-size: 10px;
        }
        .imh-ask { color: #ef4444; }
        .imh-bid { color: #10b981; justify-content: flex-end; }
        .imh-pct {
            font-weight: 700;
            font-size: 11px;
            font-family: 'Monaco','Consolas',monospace;
        }
        .imh-vol {
            font-size: 9px;
            color: #9ca3af;
        }
        .imh-track {
            flex: 1;
            height: 6px;
            display: flex;
            border-radius: 3px;
            overflow: hidden;
            background: #1a1a1a;
        }
        .imh-fill-ask {
            background: linear-gradient(90deg, #dc2626, #ef4444);
            opacity: 0.8;
            transition: width 0.4s;
            border-radius: 3px 0 0 3px;
        }
        .imh-fill-bid {
            background: linear-gradient(90deg, #059669, #10b981);
            opacity: 0.8;
            transition: width 0.4s;
            border-radius: 0 3px 3px 0;
        }
        .imh-center {
            display: flex;
            align-items: center;
            gap: 4px;
            min-width: 54px;
            justify-content: center;
            font-size: 12px;
        }
        .imh-ratio {
            font-weight: 700;
            font-size: 10px;
            color: #94a3b8;
            font-family: 'Monaco','Consolas',monospace;
        }
        @media (max-width: 640px) {
            .imh-label { min-width: 70px; }
            .imh-vol { display: none; }
            .imh-center { min-width: 40px; }
        }
    </style>
</head>
<body class="orderbook-page">
    <div id="app">
        <div class="orderbook-standalone">

            <!-- ===== HEADER ===== -->
            <div class="orderbook-header">
                <div class="ob-hdr-sym">
                    <h2>{{ symBase }} Order Book</h2>
                    <span v-if="ticker.change !== null"
                          class="ob-chg"
                          :style="{color: ticker.change >= 0 ? '#10b981' : '#ef4444'}">
                        {{ ticker.change >= 0 ? '+' : '' }}{{ ticker.change }}%
                    </span>
                    <span v-if="ticker.vol" class="ob-vol">{{ ticker.vol }}</span>
                </div>
                <div class="header-controls">
                    <div class="max-level-info">
                        <span class="max-ask-dist">🔴 -{{ maxLevelDistance.askPercent }}%</span>
                        <span class="max-bid-dist">🟢 -{{ maxLevelDistance.bidPercent }}%</span>
                    </div>
                    <div class="control-item">
                        <label>Livelli:</label>
                        <select v-model="displayLevels" @change="updateDisplay">
                            <option value="10">10</option>
                            <option value="20">20</option>
                            <option value="50">50</option>
                            <option value="100">100</option>
                        </select>
                    </div>
                    <div class="control-item">
                        <label>Raggruppa:</label>
                        <select v-model="grouping" @change="updateDisplay">
                            <option v-for="opt in groupingOptions" :key="opt" :value="opt">{{ opt }}</option>
                        </select>
                    </div>
                    <button @click="showImbalance = !showImbalance"
                            :class="['imbalance-toggle', showImbalance ? 'active' : '']">
                        IMB
                    </button>
                </div>
            </div>

            <!-- ===== STANDALONE: split grafico 2/3 + book 1/3 ===== -->
            <div v-if="isStandalone" class="ob-main ob-split">

                <!-- Chart panel (2/3) -->
                <div class="ob-chart-panel">
                    <div class="ob-chart-topbar">
                        <div class="ob-tf-bar">
                            <button v-for="tf in TF_OPTIONS" :key="tf.v"
                                    @click="changeChartTF(tf.v)"
                                    :class="['ob-tf-btn', chartTF === tf.v ? 'active' : '']">
                                {{ tf.l }}
                            </button>
                        </div>
                        <div class="ob-ohlc-info" v-if="ohlc.c">
                            <span class="ohlc-lbl">O</span>
                            <span :style="{color: ohlc.color}">{{ ohlc.o }}</span>
                            <span class="ohlc-lbl">H</span>
                            <span style="color:#10b981">{{ ohlc.h }}</span>
                            <span class="ohlc-lbl">L</span>
                            <span style="color:#ef4444">{{ ohlc.l }}</span>
                            <span class="ohlc-lbl">C</span>
                            <span :style="{color: ohlc.color}">{{ ohlc.c }}</span>
                            <span :style="{color: ohlc.color}" style="font-weight:700;margin-left:4px;">{{ ohlc.pct }}</span>
                        </div>
                    </div>
                    <div ref="chartContainerEl" class="ob-chart-container"></div>
                </div>

                <!-- Book panel (1/3) -->
                <div class="ob-book-panel">
                    <div v-if="loading" class="orderbook-loading">
                        <div class="spinner"></div>
                    </div>
                    <div v-else-if="error" class="orderbook-error">
                        <p>{{ error }}</p>
                        <button @click="fetchOrderBook" class="retry-btn">Riprova</button>
                    </div>
                    <template v-else>
                        <div v-if="showImbalance" class="imbalance-hbar" :class="imbalance.signal">
                            <div class="imh-label imh-ask">
                                <span>🔴</span>
                                <span class="imh-pct">{{ (100 - parseFloat(imbalance.percent)).toFixed(1) }}%</span>
                                <span class="imh-vol">{{ imbalance.askTotal }}</span>
                            </div>
                            <div class="imh-track">
                                <div class="imh-fill-ask"
                                     :style="{ width: (100 - parseFloat(imbalance.percent)) + '%' }"></div>
                                <div class="imh-fill-bid"
                                     :style="{ width: parseFloat(imbalance.percent) + '%' }"></div>
                            </div>
                            <div class="imh-center">
                                <span>{{ imbalance.direction }}</span>
                                <span class="imh-ratio">{{ imbalance.ratio }}x</span>
                            </div>
                            <div class="imh-label imh-bid">
                                <span class="imh-vol">{{ imbalance.bidTotal }}</span>
                                <span class="imh-pct">{{ imbalance.percent }}%</span>
                                <span>🟢</span>
                            </div>
                        </div>
                        <div v-show="showBook" class="orderbook-container"
                             @mousedown="isPaused = true"
                             @mouseup="isPaused = false"
                             @mouseleave="isPaused = false"
                             @touchstart="isPaused = true"
                             @touchend="isPaused = false"
                             :class="{ 'paused': isPaused }">
                            <div class="orderbook-side">
                                <div v-for="(ask, index) in displayAsks" :key="'ask-'+index"
                                     class="book-row"
                                     :class="{ 'max-level': ask.isMaxLevel, 'empty-level': ask.isEmpty }">
                                    <div class="depth-bar ask-bar">
                                        <div class="depth-filler" :style="{ width: ask.depthPercent + '%' }"></div>
                                    </div>
                                    <div class="price-cell ask-price">{{ ask.price }}</div>
                                    <div class="amount-cell">{{ ask.amount }}</div>
                                    <div class="total-cell">{{ ask.total }}</div>
                                </div>
                            </div>
                            <div class="current-price-box">
                                <div class="price-value" :style="{ color: priceColor }">{{ currentPrice }}</div>
                                <div class="spread-value">Spread: {{ spread }}</div>
                            </div>
                            <div class="orderbook-side">
                                <div v-for="(bid, index) in displayBids" :key="'bid-'+index"
                                     class="book-row"
                                     :class="{ 'max-level': bid.isMaxLevel }">
                                    <div class="depth-bar bid-bar">
                                        <div class="depth-filler" :style="{ width: bid.depthPercent + '%' }"></div>
                                    </div>
                                    <div class="price-cell bid-price">{{ bid.price }}</div>
                                    <div class="amount-cell">{{ bid.amount }}</div>
                                    <div class="total-cell">{{ bid.total }}</div>
                                </div>
                            </div>
                        </div>
                    </template>
                </div>
            </div>

            <!-- ===== IFRAME: layout originale ===== -->
            <template v-else>
                <div v-if="loading" class="orderbook-loading">
                    <div class="spinner"></div>
                    <p>Caricamento Order Book...</p>
                </div>
                <div v-else-if="error" class="orderbook-error">
                    <p>{{ error }}</p>
                    <button @click="fetchOrderBook" class="retry-btn">Riprova</button>
                </div>
                <div v-else class="orderbook-wrapper">
                    <div v-if="showImbalance" class="imbalance-hbar" :class="imbalance.signal">
                        <div class="imh-label imh-ask">
                            <span>🔴</span>
                            <span class="imh-pct">{{ (100 - parseFloat(imbalance.percent)).toFixed(1) }}%</span>
                            <span class="imh-vol">{{ imbalance.askTotal }}</span>
                        </div>
                        <div class="imh-track">
                            <div class="imh-fill-ask"
                                 :style="{ width: (100 - parseFloat(imbalance.percent)) + '%' }"></div>
                            <div class="imh-fill-bid"
                                 :style="{ width: parseFloat(imbalance.percent) + '%' }"></div>
                        </div>
                        <div class="imh-center">
                            <span>{{ imbalance.direction }}</span>
                            <span class="imh-ratio">{{ imbalance.ratio }}x</span>
                        </div>
                        <div class="imh-label imh-bid">
                            <span class="imh-vol">{{ imbalance.bidTotal }}</span>
                            <span class="imh-pct">{{ imbalance.percent }}%</span>
                            <span>🟢</span>
                        </div>
                    </div>
                    <div v-show="showBook" class="orderbook-container"
                         @mousedown="isPaused = true"
                         @mouseup="isPaused = false"
                         @mouseleave="isPaused = false"
                         @touchstart="isPaused = true"
                         @touchend="isPaused = false"
                         :class="{ 'paused': isPaused }">
                        <div class="orderbook-side">
                            <div v-for="(ask, index) in displayAsks" :key="'ask-'+index"
                                 class="book-row"
                                 :class="{ 'max-level': ask.isMaxLevel, 'empty-level': ask.isEmpty }">
                                <div class="depth-bar ask-bar">
                                    <div class="depth-filler" :style="{ width: ask.depthPercent + '%' }"></div>
                                </div>
                                <div class="price-cell ask-price">{{ ask.price }}</div>
                                <div class="amount-cell">{{ ask.amount }}</div>
                                <div class="total-cell">{{ ask.total }}</div>
                            </div>
                        </div>
                        <div class="current-price-box">
                            <div class="price-value" :style="{ color: priceColor }">{{ currentPrice }}</div>
                            <div class="spread-value">Spread: {{ spread }}</div>
                        </div>
                        <div class="orderbook-side">
                            <div v-for="(bid, index) in displayBids" :key="'bid-'+index"
                                 class="book-row"
                                 :class="{ 'max-level': bid.isMaxLevel }">
                                <div class="depth-bar bid-bar">
                                    <div class="depth-filler" :style="{ width: bid.depthPercent + '%' }"></div>
                                </div>
                                <div class="price-cell bid-price">{{ bid.price }}</div>
                                <div class="amount-cell">{{ bid.amount }}</div>
                                <div class="total-cell">{{ bid.total }}</div>
                            </div>
                        </div>
                    </div>
                </div>
            </template>

        </div>
    </div>
</body>
</html>
