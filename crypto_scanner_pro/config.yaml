name: "Crypto Scanner Pro"
version: "2.4.1"
slug: "crypto_scanner_pro"
description: "Scanner crypto avanzato con EMA touch, volume, daily flip e ATH/ATL via Telegram"
url: "https://github.com/Rulezt/crypto-scanner-ha"
arch:
  - aarch64
  - amd64
  - armhf
  - armv7
startup: application
boot: auto
init: false
options:
  telegram_token: ""
  telegram_chat_id: ""
  ema_touch_threshold: 2.0
  ath_atl_threshold: 1.0
schema:
  telegram_token: str
  telegram_chat_id: str
  ema_touch_threshold: float
  ath_atl_threshold: float
ingress: true
ingress_port: 8080
ingress_entry: /
ports:
  8080/tcp: 8080
ports_description:
  8080/tcp: "Web Dashboard"
panel_icon: mdi:currency-btc
panel_title: "Crypto Scanner"
